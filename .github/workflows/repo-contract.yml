name: Repo Contract

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "refactor/**"
      - "chore/**"
      - "docs/**"
      - "hotfix/**"
  pull_request:

jobs:
  contract-and-native-sanity:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repo-native tickets
        run: python3 Scripts/validate_humble_tickets.py

      - name: Validate repo contract
        run: python3 Scripts/validate_repo_contract.py

      - name: Compile local workflow scripts
        run: python3 -m py_compile Scripts/*.py

      - name: Diff whitespace check
        run: git diff --check

      - name: Native sanity build
        run: xcodebuild -project HumbleStudio.xcodeproj -scheme HumbleStudioMac -configuration Debug CODE_SIGNING_ALLOWED=NO build
